<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="460" viewBox="0 0 1400 460" role="img" aria-labelledby="title desc">
  <title id="title">Cobre notification events production architecture</title>
  <desc id="desc">Production architecture with platform events, notification API, subscription validation, notification store, transactional outbox, relay, queue, worker, client webhook, and observability.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1e1e1e"/>
    </marker>
    <style>
      .box { stroke: #1e1e1e; stroke-width: 2; rx: 8; }
      .text { font: 16px Arial, sans-serif; fill: #1e1e1e; }
      .small { font: 13px Arial, sans-serif; fill: #1e1e1e; }
      .line { stroke: #1e1e1e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .implemented { stroke-dasharray: 0; }
      .proposed { stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect x="35" y="125" width="155" height="70" class="box" fill="#e8f3ff"/>
  <text x="62" y="154" class="text">Cobre Platform</text>
  <text x="62" y="176" class="small">domain events</text>

  <rect x="270" y="85" width="225" height="155" class="box implemented" fill="#ecf9ec"/>
  <text x="298" y="116" class="text">Notification Capability</text>
  <text x="298" y="145" class="small">local slice: API + fixture store</text>
  <text x="298" y="168" class="small">subscription validation concept</text>
  <text x="298" y="191" class="small">replay + webhook delivery</text>

  <rect x="590" y="45" width="185" height="75" class="box proposed" fill="#fff3bf"/>
  <text x="632" y="76" class="text">PostgreSQL</text>
  <text x="620" y="98" class="small">notification + attempts</text>

  <rect x="590" y="170" width="185" height="75" class="box proposed" fill="#fff3bf"/>
  <text x="632" y="202" class="text">Outbox Table</text>
  <text x="628" y="224" class="small">atomic delivery work</text>

  <rect x="855" y="170" width="160" height="75" class="box proposed" fill="#ffe8cc"/>
  <text x="893" y="202" class="text">Outbox Relay</text>
  <text x="891" y="224" class="small">publish pending rows</text>

  <rect x="1090" y="170" width="145" height="75" class="box proposed" fill="#ffd8a8"/>
  <text x="1127" y="202" class="text">RabbitMQ</text>
  <text x="1121" y="224" class="small">delivery queue</text>

  <rect x="855" y="45" width="380" height="75" class="box proposed" fill="#d3f9d8"/>
  <text x="970" y="76" class="text">Observability</text>
  <text x="900" y="98" class="small">metrics, logs, traces, alerts, dashboards</text>

  <rect x="1285" y="125" width="150" height="70" class="box" fill="#e8f3ff"/>
  <text x="1310" y="154" class="text">Client HTTPS</text>
  <text x="1326" y="176" class="small">webhook</text>

  <rect x="1285" y="270" width="150" height="70" class="box" fill="#e5dbff"/>
  <text x="1311" y="299" class="text">Client API</text>
  <text x="1301" y="321" class="small">query + replay</text>

  <rect x="1075" y="300" width="175" height="80" class="box proposed" fill="#e5dbff"/>
  <text x="1110" y="330" class="text">Delivery Worker</text>
  <text x="1107" y="352" class="small">HTTPS + retries</text>

  <path d="M190 160 L270 160" class="line"/>
  <path d="M495 132 L590 85" class="line proposed"/>
  <path d="M495 185 L590 208" class="line proposed"/>
  <path d="M775 208 L855 208" class="line proposed"/>
  <path d="M1015 208 L1090 208" class="line proposed"/>
  <path d="M1162 245 L1162 300" class="line proposed"/>
  <path d="M1250 340 C1320 340 1320 210 1360 195" class="line"/>
  <path d="M1285 305 L495 220" class="line"/>
  <path d="M495 105 C620 10 930 10 1045 45" class="line proposed"/>
  <path d="M1162 300 C1040 255 1000 150 1045 120" class="line proposed"/>

  <rect x="35" y="385" width="22" height="14" fill="#ecf9ec" stroke="#1e1e1e"/>
  <text x="66" y="397" class="small">Implemented in local assessment slice</text>
  <rect x="330" y="385" width="22" height="14" fill="#fff3bf" stroke="#1e1e1e" stroke-dasharray="6 4"/>
  <text x="361" y="397" class="small">Production architecture proposal</text>
</svg>
